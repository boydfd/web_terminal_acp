apply plugin: 'com.android.application'

def releaseStoreFilePath = project.findProperty("WEB_TERMINAL_ANDROID_RELEASE_STORE_FILE") ?: System.getenv("WEB_TERMINAL_ANDROID_RELEASE_STORE_FILE")
def releaseStorePassword = project.findProperty("WEB_TERMINAL_ANDROID_RELEASE_STORE_PASSWORD") ?: System.getenv("WEB_TERMINAL_ANDROID_RELEASE_STORE_PASSWORD")
def releaseKeyAlias = project.findProperty("WEB_TERMINAL_ANDROID_RELEASE_KEY_ALIAS") ?: System.getenv("WEB_TERMINAL_ANDROID_RELEASE_KEY_ALIAS")
def releaseKeyPassword = project.findProperty("WEB_TERMINAL_ANDROID_RELEASE_KEY_PASSWORD") ?: System.getenv("WEB_TERMINAL_ANDROID_RELEASE_KEY_PASSWORD")
def hasReleaseSigningConfig = releaseStoreFilePath && releaseStorePassword && releaseKeyAlias && releaseKeyPassword
def allowUnsignedRelease = (project.findProperty("WEB_TERMINAL_ANDROID_ALLOW_UNSIGNED_RELEASE") ?: System.getenv("WEB_TERMINAL_ANDROID_ALLOW_UNSIGNED_RELEASE") ?: "false").toString().toBoolean()

android {
    namespace = "com.webterminal.acp"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.webterminal.acp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 21806
        versionName "2.18.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigningConfig) {
            release {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigningConfig) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        localRelease {
            initWith release
            matchingFallbacks = ['release']
            signingConfig signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(":app:assembleRelease") && !hasReleaseSigningConfig && !allowUnsignedRelease) {
        throw new GradleException("assembleRelease requires release signing credentials. Use assembleLocalRelease for an installable local APK, or set WEB_TERMINAL_ANDROID_ALLOW_UNSIGNED_RELEASE=true when you intentionally need an unsigned APK for external signing.")
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
